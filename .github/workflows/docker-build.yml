name: Build and Push WorldMonitor Docker Images

on:
  schedule:
    - cron: '43 21 * * *' # Check daily at 06:43 AM KST
  workflow_dispatch: # Allow manual triggers
    inputs:
      version:
        description: 'Version tag to build (e.g. v1.2.3)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Step 1: Determine which upstream tag to build
  # ──────────────────────────────────────────────────────────────────────────
  resolve-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_tag: ${{ steps.determine_tag.outputs.build_tag }}
      owner: ${{ steps.owner.outputs.owner }}
    steps:
      - name: Get latest release tag from upstream
        id: get_upstream_tag
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.version == 'latest')
        run: |
          # Try to get latest release tag first
          LATEST_TAG=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/koala73/worldmonitor/releases/latest | jq -r '.tag_name')

          # If no releases exist, fallback to the latest tag
          if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/koala73/worldmonitor/tags | jq -r '.[0].name')
          fi

          if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "Failed to fetch latest tag."
            exit 1
          fi

          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Determine tag to build
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.version }}" != "latest" ]; then
            echo "build_tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "build_tag=${{ steps.get_upstream_tag.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Set lower case owner name
        id: owner
        run: |
          echo "owner=$(echo ${GITHUB_REPOSITORY_OWNER} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────────────────
  # Step 2: Build worldmonitor (main app)
  # ──────────────────────────────────────────────────────────────────────────
  build-worldmonitor:
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists in GHCR
        id: check_image
        run: |
          BUILD_TAG=${{ needs.resolve-tag.outputs.build_tag }}
          IMAGE="ghcr.io/${{ needs.resolve-tag.outputs.owner }}/worldmonitor:${BUILD_TAG}"

          echo "Checking if $IMAGE exists..."
          if docker manifest inspect $IMAGE > /dev/null 2>&1; then
            echo "Image for tag $BUILD_TAG already exists. Skipping build."
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Image for tag $BUILD_TAG does not exist. Proceeding with build."
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for Docker
        if: steps.check_image.outputs.skip_build == 'false'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.owner }}/worldmonitor
          tags: |
            type=raw,value=${{ needs.resolve-tag.outputs.build_tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' || github.event.inputs.version == 'latest' }}

      - name: Build and push worldmonitor image
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=worldmonitor
          cache-to: type=gha,mode=max,scope=worldmonitor
          build-args: |
            WORLDMONITOR_VERSION=${{ needs.resolve-tag.outputs.build_tag }}

  # ──────────────────────────────────────────────────────────────────────────
  # Step 3: Build worldmonitor-ais-relay
  # ──────────────────────────────────────────────────────────────────────────
  build-ais-relay:
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists in GHCR
        id: check_image
        run: |
          BUILD_TAG=${{ needs.resolve-tag.outputs.build_tag }}
          IMAGE="ghcr.io/${{ needs.resolve-tag.outputs.owner }}/worldmonitor-ais-relay:${BUILD_TAG}"

          echo "Checking if $IMAGE exists..."
          if docker manifest inspect $IMAGE > /dev/null 2>&1; then
            echo "Image for tag $BUILD_TAG already exists. Skipping build."
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Image for tag $BUILD_TAG does not exist. Proceeding with build."
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for Docker
        if: steps.check_image.outputs.skip_build == 'false'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.owner }}/worldmonitor-ais-relay
          tags: |
            type=raw,value=${{ needs.resolve-tag.outputs.build_tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' || github.event.inputs.version == 'latest' }}

      - name: Build and push ais-relay image
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.relay
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ais-relay
          cache-to: type=gha,mode=max,scope=ais-relay
          build-args: |
            WORLDMONITOR_VERSION=${{ needs.resolve-tag.outputs.build_tag }}

  # ──────────────────────────────────────────────────────────────────────────
  # Step 4: Build worldmonitor-redis-rest
  # ──────────────────────────────────────────────────────────────────────────
  build-redis-rest:
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists in GHCR
        id: check_image
        run: |
          BUILD_TAG=${{ needs.resolve-tag.outputs.build_tag }}
          IMAGE="ghcr.io/${{ needs.resolve-tag.outputs.owner }}/worldmonitor-redis-rest:${BUILD_TAG}"

          echo "Checking if $IMAGE exists..."
          if docker manifest inspect $IMAGE > /dev/null 2>&1; then
            echo "Image for tag $BUILD_TAG already exists. Skipping build."
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Image for tag $BUILD_TAG does not exist. Proceeding with build."
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for Docker
        if: steps.check_image.outputs.skip_build == 'false'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.owner }}/worldmonitor-redis-rest
          tags: |
            type=raw,value=${{ needs.resolve-tag.outputs.build_tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' || github.event.inputs.version == 'latest' }}

      - name: Build and push redis-rest image
        if: steps.check_image.outputs.skip_build == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.redis-rest
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=redis-rest
          cache-to: type=gha,mode=max,scope=redis-rest
          build-args: |
            WORLDMONITOR_VERSION=${{ needs.resolve-tag.outputs.build_tag }}
